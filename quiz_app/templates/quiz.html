<!DOCTYPE html>
<html>

<head>
    <title>Quiz</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="quiz-container">
        <h2>Question {{ q_number }} of {{ total }}</h2>
        <h3>{{ question['question'] }}</h3>

        <form method="POST">
            <div class="options">
                {% for option in ['option1', 'option2', 'option3', 'option4'] %}
                <button type="submit" name="answer" value="{{ question[option] }}" class="option-tile">
                    {{ question[option] }}
                </button>
                {% endfor %}
            </div>
        </form>
    </div>
</body>

</html>
